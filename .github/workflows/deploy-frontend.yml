name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-frontend.yml"
      - "frontend/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Deploy frontend scope
        shell: bash
        env:
          DEPLOY_BASE_URL: https://guerrerocarlos.w7s.cloud
          ARTIFACT_MODE: source
          REPOSITORY_NAME: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          DEPLOY_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ ! -d frontend ]; then
            {
              echo "### Frontend Deploy"
              echo
              echo "Skipped: no \`frontend/\` directory was present."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          deploy_url="${DEPLOY_BASE_URL%/}/_deploy?mode=logs&scope=frontend&artifact=${ARTIFACT_MODE}"
          archive_path="$RUNNER_TEMP/frontend-deploy.zip"
          response_body="$RUNNER_TEMP/frontend-deploy-response.json"

          zip -qr "$archive_path" . -x ".git/*" "node_modules/*"

          http_status="$(curl -sS -o "$response_body" -w "%{http_code}" \
            -X POST "$deploy_url" \
            -H "Authorization: Bearer ${DEPLOY_TOKEN}" \
            -H "x-github-repository: ${REPOSITORY_NAME}" \
            -H "x-github-branch: ${REF_NAME}" \
            -H "x-github-sha: ${COMMIT_SHA}" \
            -H "content-type: application/zip" \
            --data-binary "@${archive_path}")"

          echo "Frontend deploy HTTP status: ${http_status}"
          cat "$response_body"

          node - "$response_body" "$http_status" >> "$GITHUB_STEP_SUMMARY" <<'NODE'
          const fs = require("node:fs");
          const [, , responsePath, httpStatus] = process.argv;
          const raw = fs.readFileSync(responsePath, "utf8");
          let payload = null;
          try {
            payload = JSON.parse(raw);
          } catch {}
          const lines = [
            "### Frontend Deploy",
            "",
            `- HTTP status: \`${httpStatus}\``,
          ];
          if (payload && typeof payload === "object") {
            lines.push(`- W7S status: \`${payload.status ?? "unknown"}\``);
            lines.push(`- Scope: \`${payload.data?.deployScope ?? "frontend"}\``);
            lines.push(`- Static enabled: \`${payload.data?.staticSite?.enabled === true}\``);
            lines.push(`- Static asset count: \`${payload.data?.staticSite?.assetCount ?? 0}\``);
            lines.push(`- Static deploy ID: \`${payload.data?.staticSite?.deployId ?? "n/a"}\``);
            if (payload.error || payload.message) {
              lines.push(`- Error: \`${payload.error ?? payload.message}\``);
            }
          } else {
            lines.push("- Response: invalid JSON");
          }
          lines.push("", "<details><summary>Raw response</summary>", "", "```json", raw, "```", "</details>");
          process.stdout.write(lines.join("\n"));
          if (!(Number(httpStatus) >= 200 && Number(httpStatus) < 300)) process.exit(1);
          if (!payload || payload.status !== "success") process.exit(1);
          NODE
